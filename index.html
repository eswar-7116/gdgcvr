<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GDGC CVRCOE</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    /* Critical Loader CSS */
    :root {
      --background: 0 0% 100%;
      --foreground: 220 20% 8%;
    }

    body {
      margin: 0;
      background-color: hsl(var(--background, 0 0% 100%));
    }

    .initial-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fff;
      backdrop-filter: blur(4px);
      animation: fade-out-loader 4.5s ease-out forwards;
    }

    .loader-container {
      position: relative;
      width: 20rem;
      height: 20rem;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: gentle-breathe 4s ease-in-out infinite;
    }

    @media (min-width: 768px) {
      .loader-container {
        width: 24rem;
        height: 24rem;
      }
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 9999px;
      background-color: #9ca3af;
      opacity: 0;
      animation: float-particle 6s linear infinite;
    }

    .svg-container {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    @keyframes draw-line {
      from {
        stroke-dashoffset: 100;
      }

      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes gentle-breathe {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.03);
      }
    }

    @keyframes fade-out-loader {

      0%,
      85% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes float-particle {
      0% {
        transform: translate(0, 0);
        opacity: 0;
      }

      25% {
        opacity: 0.3;
      }

      50% {
        transform: translate(0, -15px);
        opacity: 0.15;
      }

      75% {
        opacity: 0.3;
      }

      100% {
        transform: translate(0, -30px);
        opacity: 0;
      }
    }

    .animate-draw-black {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw-line 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }

    .animate-draw-color {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw-line 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="initial-loader">
      <div class="loader-container">
        <div class="particles">
          <div class="particle"
            style="bottom: 2.5rem; left: 2.5rem; width: 0.375rem; height: 0.375rem; animation-delay: 0s;"></div>
          <div class="particle"
            style="bottom: 5rem; right: 5rem; width: 0.25rem; height: 0.25rem; animation-delay: 1s;"></div>
          <div class="particle" style="bottom: 1.25rem; left: 50%; width: 0.5rem; height: 0.5rem; animation-delay: 2s;">
          </div>
        </div>
        <div class="svg-container">
          <svg width="100%" height="100%" viewBox="-40 -30 180 160" fill="none" xmlns="http://www.w3.org/2000/svg"
            style="overflow: visible;">
            <path d="M35 38 L15 50 L35 62" stroke="black" stroke-width="13" stroke-linecap="round"
              stroke-linejoin="round" class="animate-draw-black" pathLength="100"></path>
            <path d="M35 38 L15 50" stroke="#EA4235" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
              class="animate-draw-color" style="animation-delay: 0.8s;" pathLength="100"></path>
            <path d="M15 50 L35 62" stroke="#4386F4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
              class="animate-draw-color" style="animation-delay: 1.0s;" pathLength="100"></path>
            <path d="M65 38 L85 50 L65 62" stroke="black" stroke-width="13" stroke-linecap="round"
              stroke-linejoin="round" class="animate-draw-black" style="animation-delay: 0.4s;" pathLength="100"></path>
            <path d="M85 50 L65 62" stroke="#F8BA04" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
              class="animate-draw-color" style="animation-delay: 1.4s;" pathLength="100"></path>
            <path d="M65 38 L85 50" stroke="#119C58" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"
              class="animate-draw-color" style="animation-delay: 1.2s;" pathLength="100"></path>
          </svg>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
